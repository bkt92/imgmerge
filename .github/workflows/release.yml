name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: imgmerge
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: imgmerge
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: imgmerge
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: imgmerge.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgmerge-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          # Linux
          mv imgmerge-x86_64-unknown-linux-gnu/imgmerge imgmerge-x86_64-linux
          gzip imgmerge-x86_64-linux
          # macOS x86_64
          mv imgmerge-x86_64-apple-darwin/imgmerge imgmerge-x86_64-macos
          gzip imgmerge-x86_64-macos
          # macOS aarch64
          mv imgmerge-aarch64-apple-darwin/imgmerge imgmerge-aarch64-macos
          gzip imgmerge-aarch64-macos
          # Windows
          mv imgmerge-x86_64-pc-windows-msvc/imgmerge.exe imgmerge-x86_64-windows.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/imgmerge-x86_64-linux.gz
            artifacts/imgmerge-x86_64-macos.gz
            artifacts/imgmerge-aarch64-macos.gz
            artifacts/imgmerge-x86_64-windows.exe
          generate_release_notes: true
